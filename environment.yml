name: py312_s1grits_v100
channels:
  - conda-forge

dependencies:
  - python=3.12
  - pip

  # Geospatial core (conda-forge binary wheels — do NOT use pip for these)
  - rasterio
  - geopandas
  - rioxarray
  - pyproj
  - shapely

  # Array / data stack
  - numpy
  - scipy
  - pandas
  - xarray
  - zarr
  - h5py
  - pyarrow

  # Network / ASF access
  - requests
  - urllib3
  - tqdm
  - fsspec
  - asf_search

  # Config / utilities
  - pydantic
  - pyyaml
  - python-dateutil
  - rich
  - psutil
  - tenacity
  - defusedxml

  # Image processing
  - scikit-image
  - pillow

  # Notebook support (optional but convenient)
  - ipykernel
  - ipywidgets

  - pip:
    - s1grits @ .
