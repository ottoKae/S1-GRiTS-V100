# =============================================================================
# S1-GRiTS (v1.0) User's Configuration
# =============================================================================

# =============================================================================
# ROI CONFIGURATION — Define your area of interest
#   Pick ONE mode (comment out the other):
#
#   Mode A [wkt]    — polygon geometry in WKT format (EPSG:4326)
#                     MGRS tiles are auto-detected from spatial overlap
#                     Best for: new areas, irregular shapes, large regions
#
#   Mode B [manual] — explicit MGRS tile list, no geometry required
#                     Best for: known tiles, faster startup, reproducible runs
#
#   Both modes are fully compatible with all time range modes ('years' / 'full')
# =============================================================================
roi:
  # --- Mode A: WKT polygon (EPSG:4326) ---
  # Draw your polygon at https://search.asf.alaska.edu/ and paste the WKT here.
  # The system will automatically detect all overlapping MGRS tiles.
  # Example: Wuhan city area, MGRS grid 50R
  # wkt: "POLYGON((113.587 30.0001,114.8881 30.0001,114.8881 30.9441,113.587 30.9441,113.587 30.0001))"

  # --- Mode B: Manual MGRS tile list ---
  # Specify tile IDs directly. No polygon geometry needed.
  # Faster startup and fully reproducible — recommended when tile IDs are known.
  # To use Mode B: comment out 'wkt' above and uncomment the lines below.
  manual_mgrs_tiles:
    - "50RKV"

  # Orbit direction filter (REQUIRED — pick one)
  # Options : "ASCENDING" | "DESCENDING"
  # Note    : Ascending and descending orbits have different look angles and
  #           temporal baselines. Process them separately for consistency.
  #           To cover both orbits, run the workflow twice with different configs.
  flight_direction: "ASCENDING"
  # flight_direction: "DESCENDING"

  # Polarization mode (dual-polarization only)
  # Options : "VV+VH"  — standard for land surfaces (vegetation, urban, soil)
  #           "HH+HV"  — used for polar ice, sea ice, and some ocean applications
  # Note    : Single-polarization ("VV", "HH", etc.) is NOT supported.
  #           OPERA RTC-S1 products are always dual-polarization.
  polarization: "VV+VH"
  # polarization: "HH+HV"

# =============================================================================
# TIME CONFIGURATION
#   Pick one mode (comment out the other):
#
#   Mode A [full]  — auto-detect earliest available data from ASF,
#                    process through to end_year-12-31
#   Mode B [years] — process specific years and optional months
#
#   Both modes work with roi Mode A (wkt) and Mode B (manual)
# =============================================================================
time:
  # --- Mode A: Full archive ---
  # Automatically detects the earliest available RTC-S1 data for the ROI,
  # then processes from that date through to December 31 of the specified year.
  # full: 2026

  # --- Mode B: Specific years ---
  years: [2026]         # List of years to process
  months: [2]           # Optional: specify months (1-12); omit to process all 12 months

  # More examples:
  # years: [2021, 2022, 2023]   # Multi-year processing
  # months: [10, 11, 12]        # Q4 only
  # months: [6, 7, 8]           # Summer months only

# =============================================================================
# OUTPUT CONFIGURATION
# =============================================================================
output:
  # Output root directory
  # Auto-creates the following structure:
  #   {base_dir}/{mgrs_tile_id}/cog/      — GeoTiff COG files
  #   {base_dir}/{mgrs_tile_id}/zarr/     — Zarr time-series store
  #   {base_dir}/{mgrs_tile_id}/preview/  — PNG preview thumbnails
  base_dir: "./output"

  # Whether to overwrite existing output for processed months
  # false: skip months that already have output (safe for incremental runs)
  # true:  re-process and replace existing COG, Zarr slice, and Preview for each month
  overwrite: false

  # Output format selection: set false to skip writing that format to disk
  # - cog:     GeoTiff COG files (one per month, for QGIS/visualization)
  #            Can be regenerated from Zarr at any time
  # - preview: PNG preview images (low-resolution overview thumbnails)
  # Note: Zarr is ALWAYS generated — it is required for grid locking
  #       and incremental update support; it cannot be disabled
  formats:
    cog: true
    preview: true

# =============================================================================
# PARALLEL PROCESSING CONFIGURATION
# =============================================================================
parallel:
  # Enable parallel processing across multiple MGRS tiles
  enabled: true

  # Number of parallel workers (= simultaneous MGRS tiles being processed)
  # Recommended based on available system RAM:
  #   ≤16 GB RAM: 2
  #   32 GB RAM:  4 (recommended)
  #   ≥64 GB RAM: 6-8
  max_workers: 4

# =============================================================================
# MEMORY MANAGEMENT CONFIGURATION
# =============================================================================
memory:
  # Maximum memory usage (GB)
  # 'auto': automatically detect and use available system memory
  # number: manually cap usage (e.g., 16 to limit to 16 GB)
  max_memory_gb: 'auto'

  # Batch processing strategy — controls how time periods are chunked
  # 'auto':      automatically choose based on available memory (recommended)
  # 'yearly':    process one full year per batch (requires ≥32 GB)
  # 'quarterly': process one quarter per batch (requires ≥16 GB)
  # 'monthly':   process one month per batch (conservative / low-memory mode)
  batch_strategy: 'auto'

  # Maximum number of concurrent scene downloads per worker
  max_download_workers: 2

  # Clear in-memory cache after each batch to free RAM between batches
  clear_cache_per_batch: true

# =============================================================================
# PROCESSING CONFIGURATION
# =============================================================================
processing:
  # Target coordinate reference system (CRS)
  # Options:
  #   null or 'auto': Auto-derive UTM zone from MGRS tile ID (recommended)
  #                   Each tile uses its native UTM projection
  #                   e.g., tile 17MPV → EPSG:32617 (UTM Zone 17N)
  #   'EPSG:3857':    Web Mercator — suitable for web mapping / crossUTM mode
  #   'EPSG:XXXXX':   Any valid EPSG code — overrides auto-derivation
  #
  # Tip: Use null with build_s1_monthly_cog_and_zarr_tileUTM() to enable
  #      per-tile UTM detection and avoid cross-zone distortion
  target_crs: null  # Auto-derive from MGRS tile ID (recommended)

  # Target output resolution in meters
  # Default: 30.0 m (matches OPERA RTC-S1 native resolution)
  target_resolution: 30.0

  # Apply ROI polygon as a spatial mask during processing
  # true:  pixels outside the WKT polygon are masked (set to NoData)
  # false: full MGRS tile extent is processed (recommended for most cases)
  use_roi_mask: false

  # Burst mosaic strategy — how overlapping burst scenes are combined
  # "mean":      average of all valid pixels (default, smooth result)
  # "first":     use the first valid pixel (fastest)
  # "last":      use the last valid pixel
  mosaic_strategy: "mean"

  # Time grouping granularity for scene deduplication
  # "minute": group scenes acquired within the same minute (recommended)
  group_mode: "minute"

  # Trimmed mean clipping fraction for temporal compositing
  # 0.15 means the lowest 15% and highest 15% of values are excluded
  # before computing the monthly median — reduces outlier influence
  trim_fraction: 0.15

  # How to handle scenes with identical acquisition timestamps
  # "skip": ignore duplicate timestamps (recommended; prevents double-counting)
  on_time_conflict: "skip"

  # Minimum valid backscatter value in linear scale
  # Pixels below this threshold are treated as NoData / invalid
  min_valid_lin: 1.0e-6

  # Small epsilon added to linear values to prevent log(0) errors
  eps_lin: 1.0e-7

  # ---------------------------------------------------------------------------
  # Despeckle Configuration
  # TV (Total Variation) despeckling applied after monthly compositing
  # ---------------------------------------------------------------------------
  despeckle:
    # Apply TV despeckling to the monthly composite
    # true:  enables hARDCp pipeline (mosaic → median composite → despeckle → Ratio/RVI)
    # false: enables ARDC pipeline   (mosaic → median composite only, no despeckle)
    monthly_despeckle: true

    # Despeckling algorithm
    # "tv_bregman": Split Bregman TV minimization (fast, high quality)
    method: "tv_bregman"

    # Algorithm-specific parameters
    kwargs:
      # Regularization strength — higher values = stronger smoothing
      # Typical range: 1.0 (light) to 20.0 (heavy)
      reg_param: 5.0

  # Zarr chunk size in pixels (y × x per chunk)
  # 1024 × 1024 is a good balance between read performance and memory usage
  zarr_chunks:
    y: 1024
    x: 1024

  # COG internal tile block size in pixels
  # 256 is the standard for cloud-optimized GeoTiff (COG) compatibility
  cog_block_size: 256

  # ---------------------------------------------------------------------------
  # Optional GLCM Texture Features
  # Computed in the dB domain after monthly compositing and optional TV denoising.
  # When enabled, texture bands are appended after the 4 core bands in COG and Zarr.
  # Band naming format: {VV|VH}_glcm_{metric}
  # Examples: VV_glcm_contrast, VH_glcm_entropy
  # ---------------------------------------------------------------------------
  texture_features:
    # Master switch — set to true to enable texture band generation
    enabled: false

    # Which dB-domain bands to compute GLCM textures from
    # Options: "VV_dB" and/or "VH_dB"
    inputs: ["VV_dB", "VH_dB"]

    # Texture metrics to compute
    # Available: contrast, homogeneity, entropy, correlation
    metrics: ["contrast", "homogeneity", "entropy", "correlation"]

    # Sliding window size in pixels (must be an odd number)
    # Larger windows capture coarser texture at the cost of spatial detail
    window_size: 5

    # GLCM pixel-pair offset distance (in pixels)
    distance: 1

    # GLCM computation angles (degrees)
    # Results are averaged across all specified angles for rotation invariance
    angles: [0, 45, 90, 135]

    # Average texture values across all angles
    # true: produces rotationally invariant texture features (recommended)
    average_angles: true

    # Number of gray levels for intensity quantization
    # 32 or 64 recommended — higher values increase accuracy but slow computation
    levels: 32

    # dB clipping range for VV band before quantization [min_dB, max_dB]
    # Values outside this range are clipped before computing the GLCM
    vv_db_range: [-25, 5]

    # dB clipping range for VH band before quantization [min_dB, max_dB]
    vh_db_range: [-32, -5]

  # ---------------------------------------------------------------------------
  # Zarr Time Ordering Fix
  # Ensures the Zarr time dimension is sorted in chronological order.
  # Incremental processing can insert time steps out of order — this corrects that.
  # ---------------------------------------------------------------------------
  zarr_time_fix:
    # Automatically fix time ordering after each processing run
    enabled: true

    # Create a timestamped backup of the Zarr store before sorting (recommended)
    create_backup: true

    # Backup directory
    # null: create backup alongside the original Zarr store with a timestamp suffix
    # path: specify a custom directory for backups
    backup_dir: null

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
logging:
  # Log level for the output file (verbose — captures all diagnostic info)
  # Options: DEBUG | INFO | WARNING | ERROR | CRITICAL
  file_level: 'DEBUG'

  # Log level for console output (concise — shows warnings and above only)
  # Options: DEBUG | INFO | WARNING | ERROR | CRITICAL
  console_level: 'WARNING'

  # Suppress verbose output from third-party libraries (e.g., rasterio, xarray)
  suppress_third_party: true

  # Log file path template
  # {timestamp} is replaced with the run start time (e.g., 20260101_120000)
  log_file: './logs/s1grits_{timestamp}.log'
